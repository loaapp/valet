name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-daemon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build daemon and CLI
        run: |
          go build -o bin/valetd github.com/loaapp/valet/valetd/cmd/valetd
          go build -o bin/valet github.com/loaapp/valet/valetd/cmd/valet
      - name: Run vet
        run: |
          go vet github.com/loaapp/valet/valetd/...
          go vet github.com/loaapp/valet/pkg/...
      - uses: actions/upload-artifact@v4
        with:
          name: daemon-linux-amd64
          path: bin/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build daemon and CLI
        run: |
          go build -o bin/valetd github.com/loaapp/valet/valetd/cmd/valetd
          go build -o bin/valet github.com/loaapp/valet/valetd/cmd/valet
      - name: Build Wails app
        run: cd valetapp && wails build
      # NOTE: This build does NOT code-sign the macOS app.
      # For distribution, add an Apple Developer signing step here
      # using a certificate stored in GitHub secrets.
      - uses: actions/upload-artifact@v4
        with:
          name: valet-macos-arm64
          path: |
            bin/
            valetapp/build/bin/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-daemon, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            daemon-linux-amd64/**
            valet-macos-arm64/**
          generate_release_notes: true
