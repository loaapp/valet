name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-daemon:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: 'valetd/go.sum'
      - name: Build daemon and CLI
        working-directory: valetd
        run: |
          go build -o ../bin/valetd ./cmd/valetd
          go build -o ../bin/valet ./cmd/valet
      - name: Run vet
        run: |
          (cd valetd && go vet ./...)
          (cd pkg && go vet ./...)
      - uses: actions/upload-artifact@v4
        with:
          name: daemon-linux-amd64
          path: bin/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: |
            valetd/go.sum
            valetapp/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install create-dmg
        run: brew install create-dmg
      - name: Build Wails app
        run: cd valetapp && wails build
      - name: Bundle daemon inside app
        working-directory: valetd
        run: |
          go build -o ../valetapp/build/bin/Valet.app/Contents/MacOS/valetd ./cmd/valetd
          go build -o ../valetapp/build/bin/Valet.app/Contents/MacOS/valet ./cmd/valet
      - name: Create DMG
        run: |
          create-dmg --volname "Valet" --window-size 600 400 \
            --icon-size 100 --icon "Valet.app" 175 190 \
            --app-drop-link 425 190 --no-internet-enable \
            "Valet-snapshot.dmg" "valetapp/build/bin/" || true
      # TODO: Code signing — add when Apple Developer certificate is in GitHub secrets
      # - name: Sign app
      #   run: |
      #     codesign --force --deep --timestamp --options=runtime \
      #       -s "${{ secrets.APPLE_IDENTITY }}" valetapp/build/bin/Valet.app
      # TODO: Notarization — add when notary credentials are configured
      # - name: Notarize DMG
      #   run: |
      #     xcrun notarytool submit Valet-snapshot.dmg \
      #       --apple-id "${{ secrets.APPLE_ID }}" \
      #       --team-id "${{ secrets.APPLE_TEAM_ID }}" \
      #       --password "${{ secrets.APPLE_NOTARY_PASSWORD }}" --wait
      #     xcrun stapler staple Valet-snapshot.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: valet-macos-dmg
          path: Valet-snapshot.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: valet-macos-arm64
          path: |
            valetapp/build/bin/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-daemon, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            daemon-linux-amd64/**
            valet-macos-dmg/**
          generate_release_notes: true
