name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  vet:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: 'valetd/go.sum'
      - name: Build
        working-directory: valetd
        run: |
          go build ./cmd/valetd
          go build ./cmd/valet
      - name: Vet
        run: |
          (cd valetd && go vet ./...)
          (cd pkg && go vet ./...)

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [vet]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: |
            valetd/go.sum
            valetapp/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install certificates
        env:
          APPLE_CERT_APP: ${{ secrets.APPLE_CERT_APP }}
          APPLE_CERT_INSTALLER: ${{ secrets.APPLE_CERT_INSTALLER }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          APP_P12=$RUNNER_TEMP/app.p12
          echo "$APPLE_CERT_APP" | base64 --decode > "$APP_P12"
          security import "$APP_P12" -P "$APPLE_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm "$APP_P12"

          INST_P12=$RUNNER_TEMP/installer.p12
          echo "$APPLE_CERT_INSTALLER" | base64 --decode > "$INST_P12"
          security import "$INST_P12" -P "$APPLE_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm "$INST_P12"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Build, sign, and notarize
        env:
          VERSION: ${{ github.ref_name }}
          APPLE_APP_IDENTITY: ${{ secrets.APPLE_APP_IDENTITY }}
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          export VERSION="${VERSION#v}"
          ./scripts/build-pkg.sh

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Valet-*.pkg
          generate_release_notes: true
